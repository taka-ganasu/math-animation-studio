patterns:
  - id: trajectory_on_surface
    name: Trajectory on Surface
    suitable_for:
      - gradient_descent
      - optimization
      - loss_minimization
    description: 2変数関数を3D曲面として描き、その上を点が移動する様子で最適化を表現する。
    visual_metaphor: 損失関数を地形として見て、点が谷へ下っていく。
    manim_template: gradient_descent_3d.py.j2
    required_visual_objects:
      - surface
      - point
      - trajectory
      - gradient_vector
      - formula

  - id: penalty_curve
    name: Penalty Curve
    suitable_for:
      - cross_entropy
      - negative_log_likelihood
      - log_loss
    description: 正解確率pに対して-log(p)がどのように増減するかをグラフで見せる。
    visual_metaphor: 正解に低い確率を置くほど罰が急激に大きくなる。
    manim_template: penalty_curve.py.j2
    required_visual_objects:
      - graph
      - probability_bar
      - highlighted_class
      - formula

  - id: matrix_similarity_heatmap
    name: Matrix Similarity Heatmap
    suitable_for:
      - attention
      - scaled_dot_product_attention
      - matrix_multiplication
      - similarity
    description: QueryとKeyの内積をヒートマップで表示し、softmax後の重みを使ってValueを混ぜる。
    visual_metaphor: どの情報を見るべきかを類似度で決める。
    manim_template: attention_heatmap.py.j2
    required_visual_objects:
      - matrix
      - heatmap
      - arrows
      - weighted_sum
      - formula

  - id: perceptron_decision_boundary
    name: Perceptron Decision Boundary
    suitable_for:
      - perceptron
      - simple_perceptron
      - neural_network
      - binary_classification
      - decision_boundary
    description: 単純パーセプトロンの重み付き和、活性化、2D決定境界を順に見せる。
    visual_metaphor: 1つのニューロンが入力を足し合わせ、境界線のどちら側かで分類する。
    manim_template: perceptron.py.j2
    required_visual_objects:
      - formula
      - nodes
      - weighted_connections
      - activation_curve
      - decision_boundary

  - id: fully_connected_forward_pass
    name: Fully Connected Forward Pass
    suitable_for:
      - fully_connected_network
      - neural_network
      - multilayer_perceptron
      - dense_layer
      - forward_pass
    description: 入力層、隠れ層、出力層をノードとして並べ、全結合の接続と順伝播を見せる。
    visual_metaphor: 1つのパーセプトロンを横に並べ、層として次の層へすべて接続する。
    manim_template: fully_connected_network.py.j2
    required_visual_objects:
      - formula
      - layers
      - weighted_connections
      - activation
      - output_distribution

  - id: backpropagation_chain_rule
    name: Backpropagation Chain Rule
    suitable_for:
      - backpropagation
      - backprop
      - neural_network_training
      - chain_rule
      - gradient
    description: 損失から出力層、隠れ層、重みへ誤差信号を戻し、勾配降下法で重みを更新する流れを見せる。
    visual_metaphor: 予測のズレを右から左へ送り返し、各接続へ修正指示を配る。
    manim_template: backpropagation.py.j2
    required_visual_objects:
      - formula
      - layers
      - backward_arrows
      - error_signals
      - weight_update

  - id: chain_rule_flow
    name: Chain Rule Flow
    suitable_for:
      - chain_rule
      - calculus
      - derivative
      - composition_function
      - backpropagation_prerequisite
    description: 合成関数を x -> u -> y の流れとして描き、隣同士の変化率を掛けて端から端の変化率にする様子を見せる。
    visual_metaphor: 変化が中継地点を通って伝わり、各区間の倍率を掛けると全体の倍率になる。
    manim_template: chain_rule.py.j2
    required_visual_objects:
      - formula
      - arrows
      - rate_cards
      - numeric_example

  - id: row_column_matrix_product
    name: Row Column Matrix Product
    suitable_for:
      - matrix_multiplication
      - linear_transformation
    description: 行列積の各要素が、左行列の行と右行列の列の内積でできることを見せる。
    visual_metaphor: 行と列が出会って一つの値を作る。
    manim_template: matrix_product.py.j2
    required_visual_objects:
      - matrix
      - row_highlight
      - column_highlight
      - dot_product

  - id: distribution_update
    name: Distribution Update
    suitable_for:
      - bayes_rule
      - posterior_update
      - probability
    description: 事前分布、尤度、事後分布の変化を重ねて見せる。
    visual_metaphor: 新しい証拠によって信念の山が移動する。
    manim_template: distribution_update.py.j2
    required_visual_objects:
      - distribution_curve
      - likelihood_curve
      - posterior_curve
      - formula

  - id: generic_symbol_decomposition
    name: Generic Symbol Decomposition
    suitable_for:
      - unknown
      - formula_understanding
      - symbol_decomposition
    description: 数式を記号と操作に分解し、各部分の意味を順番に対応づける。
    visual_metaphor: 圧縮された式を、意味のある部品に分解して並べる。
    manim_template: null
    required_visual_objects:
      - formula
      - text
