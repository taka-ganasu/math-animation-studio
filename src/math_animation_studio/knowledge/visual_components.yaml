components:
  - id: formula_focus
    name: Formula Focus
    category: formula
    description: 数式の一部分を強調し、ナレーションが今説明している記号や演算を視線誘導する。
    use_when:
      - 記号の意味を説明する
      - 演算子の役割を説明する
      - ナレーションと数式の対応を明確にする
    avoid_when:
      - 数式全体ではなく図形やグラフを主役にしたい場面
    visual_type: formula
    template_support:
      - penalty_curve
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: formula_focus
        value_type: latex_string
        description: 強調したいLaTeX部分。
        required: true
      - name: emphasis
        value_type: enum
        description: 強調方法。
        default: highlight
        allowed_values:
          - highlight
          - zoom
          - underline
      - name: caption
        value_type: string
        description: 強調部分の短い説明。
    example: "\\hat{y}_i を拡大し、モデルの予測確率として説明する。"

  - id: text_caption
    name: Text Caption
    category: narration
    description: 視覚的な操作に短い補足テキストを添える。
    use_when:
      - 図の意味を一言で補足する
      - シーンの切り替わりを短く示す
    avoid_when:
      - ナレーションと同じ長文を画面に出す場面
    visual_type: text
    template_support:
      - penalty_curve
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: caption
        value_type: string
        description: 画面に出す短い補足。
    example: "低いほど良い、という損失の読み方を短く表示する。"

  - id: model_pipeline
    name: Model Pipeline
    category: machine_learning
    description: 入力、モデル、logits、softmax、確率分布などの流れを段階として見せる。
    use_when:
      - 分類モデルの出力が確率になる過程を説明する
      - 損失関数がどの値を受け取るかを示す
    avoid_when:
      - モデル出力ではなく純粋な幾何だけを扱う場面
    visual_type: text
    template_support:
      - penalty_curve
      - storyboard_only
    params:
      - name: stages
        value_type: string_list
        description: 表示する段階名。
      - name: caption
        value_type: string
        description: 流れの要点。
    example: "画像 -> model -> logits -> softmax -> 確率分布 の順に表示する。"

  - id: one_hot_vector
    name: One Hot Vector
    category: probability
    description: 正解クラスだけが1になり、それ以外が0になるラベルをベクトルとして見せる。
    use_when:
      - y_i の意味を説明する
      - 総和の中で正解クラスだけが残ることを示す
    avoid_when:
      - ラベルがone-hotではなく連続値や分布の場合
    visual_type: axis
    template_support:
      - penalty_curve
      - storyboard_only
    params:
      - name: correct_index
        value_type: integer
        description: 正解クラスのindex。
      - name: labels
        value_type: string_list
        description: クラス名。
    example: "サイコロの目3だけが1になる6次元ベクトルを表示する。"

  - id: probability_bars
    name: Probability Bars
    category: probability
    description: クラスごとの予測確率を棒グラフで比較する。
    use_when:
      - 良い予測と悪い予測を比較する
      - 正解クラスの確率を視覚的に取り出す
    avoid_when:
      - 確率がクラスごとの離散分布ではない場面
    visual_type: axis
    template_support:
      - penalty_curve
      - storyboard_only
    params:
      - name: correct_index
        value_type: integer
        description: 正解クラスのindex。
      - name: good_distribution
        value_type: number_list
        description: 良い予測の確率分布。
      - name: bad_distribution
        value_type: number_list
        description: 悪い予測の確率分布。
    example: "正解が猫のとき、猫に0.9を置く予測と0.1しか置かない予測を並べる。"

  - id: probability_selector
    name: Probability Selector
    category: probability
    description: one-hotラベルが予測分布から正解クラスの確率だけを選ぶ様子を見せる。
    use_when:
      - y_i と \hat{y}_i の積の意味を説明する
      - sumの中でどの項が損失に効くかを示す
    avoid_when:
      - 全クラスの項を同時に分析したい場面
    visual_type: point
    template_support:
      - penalty_curve
      - storyboard_only
    params:
      - name: selected_probability
        value_type: number
        description: 選ばれた正解確率。
      - name: correct_index
        value_type: integer
        description: 正解クラスのindex。
    example: "正解クラスの棒だけを残し、他の棒を薄くする。"

  - id: negative_log_curve
    name: Negative Log Curve
    category: function
    description: pが小さいほど-log(p)が大きくなる罰の形を曲線で見せる。
    use_when:
      - logを使う理由を説明する
      - 低い正解確率の罰が急に大きくなることを示す
    avoid_when:
      - 対数ではない損失や更新則を主題にする場面
    visual_type: curve
    template_support:
      - penalty_curve
      - storyboard_only
    params:
      - name: x_range
        value_type: number_list
        description: p軸の表示範囲。
      - name: y_range
        value_type: number_list
        description: 損失軸の表示範囲。
      - name: highlighted_points
        value_type: number_list
        description: 比較したいpの値。
    example: "p=0.9とp=0.1を曲線上で比較する。"

  - id: surface_plot
    name: Surface Plot
    category: geometry
    description: 2変数の損失関数を3D曲面として表示する。
    use_when:
      - パラメータ2つと損失の関係を地形として見せる
      - 勾配降下法の軌跡を3Dで説明する
    avoid_when:
      - 1変数の曲線で十分な場面
    visual_type: surface
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: function_preset
        value_type: enum
        description: 安全に使える組み込み関数preset。
        default: quadratic_ripple
        allowed_values:
          - quadratic_ripple
          - double_well_2d
      - name: x_range
        value_type: number_list
        description: x軸の範囲。
      - name: y_range
        value_type: number_list
        description: y軸の範囲。
      - name: surface_y_shift
        value_type: number
        description: 3Dグラフ全体を下方向へずらす量。タイトルや式と重なる場合に大きくする。
        default: 2.7
      - name: surface_z_length
        value_type: number
        description: 3Dグラフの高さ方向のスケール。傾斜が急すぎる場合に小さくする。
        default: 2.4
      - name: surface_camera_zoom
        value_type: number
        description: 3Dカメラの引き具合。タイトルや字幕と重なる場合に小さくする。
        default: 0.52
      - name: surface_camera_phi
        value_type: number
        description: 3Dカメラの縦方向角度。俯瞰を強める場合に小さくする。
        default: 55.0
      - name: surface_camera_theta
        value_type: number
        description: 3Dカメラの横方向角度。曲面と軌跡が見やすい角度へ調整する。
        default: -48.0
      - name: title_top_buff
        value_type: number
        description: タイトルと画面上端の余白。
        default: 0.18
      - name: caption_bottom_buff
        value_type: number
        description: 字幕やまとめ文と画面下端の余白。
        default: 0.32
    example: "損失地形を表示し、現在地から谷へ下る点を重ねる。"

  - id: contour_map
    name: Contour Map
    category: geometry
    description: 2変数の損失を上から見た等高線として表示する。
    use_when:
      - 谷が複数ある地形を比較する
      - 2Dで初期位置と到達先を見せる
    avoid_when:
      - 高さそのものを3Dで見せたい場面
    visual_type: contour
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: function_preset
        value_type: enum
        description: 安全に使える組み込み関数preset。
        default: double_well_2d
        allowed_values:
          - double_well_2d
      - name: caption
        value_type: string
        description: 谷の読み方。
    example: "浅い谷と深い谷を等高線で表示する。"

  - id: loss_curve
    name: Loss Curve
    category: geometry
    description: 1変数の損失を横軸θ、縦軸L(θ)の曲線として表示する。
    use_when:
      - 谷、山、谷のような局所最小を1枚の曲線で説明する
      - 1変数の勾配を傾きとして説明する
    avoid_when:
      - パラメータが2つあることを主題にする場面
    visual_type: curve
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: function_preset
        value_type: enum
        description: 安全に使える組み込み関数preset。
        default: double_well_1d
        allowed_values:
          - double_well_1d
    example: "右の谷に止まる軌跡と左の深い谷へ向かう軌跡を比較する。"

  - id: gradient_arrow
    name: Gradient Arrow
    category: optimization
    description: 勾配または負の勾配方向を矢印で示す。
    use_when:
      - 勾配が上り方向であることを説明する
      - 更新が負の勾配方向へ進むことを見せる
    avoid_when:
      - 方向の概念が出てこない場面
    visual_type: vector
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: direction
        value_type: enum
        description: 表示する方向。
        default: negative_gradient
        allowed_values:
          - gradient
          - negative_gradient
      - name: learning_rate
        value_type: number
        description: 一歩の大きさ。
    example: "現在地から下る向きとして -∇L(θ_t) の矢印を表示する。"

  - id: terrain_metaphor
    name: Terrain Metaphor
    category: metaphor
    description: 損失関数を山や谷の地形として読み替え、高さが損失であることを見せる。
    use_when:
      - 勾配降下法を山を下る比喩で説明する
      - 損失が高さとして読めることを導入する
    avoid_when:
      - 比喩を使わず純粋な数式操作だけを説明したい場面
    visual_type: surface
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: metaphor_label
        value_type: string
        description: 地形としての読み替えを示す短いラベル。
        default: 高さ = 損失
    example: "曲面を山として見せ、低い場所ほど損失が小さいと説明する。"

  - id: hiker_marker
    name: Hiker Marker
    category: metaphor
    description: 現在のパラメータ位置を山道上の人や現在地マーカーとして見せる。
    use_when:
      - パラメータを抽象的な数値ではなく現在地として説明する
      - 反復更新で現在地が動くことを見せる
    avoid_when:
      - 人や移動の比喩が不要な場面
    visual_type: point
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: label
        value_type: string
        description: 現在地マーカーに添える短いラベル。
        default: 現在地
    example: "赤い点を現在地として置き、ここから下ると説明する。"

  - id: footstep_path
    name: Footstep Path
    category: metaphor
    description: 更新の軌跡を足跡や一歩ずつ進む印として残す。
    use_when:
      - 勾配降下法が一回で答えに飛ぶのではなく、一歩ずつ進むことを示す
      - 学習率を一歩の大きさとして説明する
    avoid_when:
      - 軌跡を線だけで十分に見せたい場面
    visual_type: curve
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: footprint_every
        value_type: integer
        description: 何ステップごとに足跡を置くか。
        default: 1
    example: "点が進むたびに小さな足跡を残し、一歩ずつ下ることを見せる。"

  - id: uphill_arrow
    name: Uphill Arrow
    category: metaphor
    description: 勾配そのものが損失の増える上り方向を指すことを示す。
    use_when:
      - 勾配は下り方向ではないという誤解を解消する
      - gradientとnegative_gradientを対比する
    avoid_when:
      - 負の勾配方向だけを簡潔に見せたい場面
    visual_type: vector
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: label
        value_type: string
        description: 上り方向を示す短いラベル。
        default: 勾配 = 上り方向
    example: "赤い矢印で上り方向を示し、勾配そのものは上りだと説明する。"

  - id: downhill_arrow
    name: Downhill Arrow
    category: metaphor
    description: 更新で実際に進む負の勾配方向を下り方向として示す。
    use_when:
      - 勾配の逆向きへ進むことを直感化する
      - 式のマイナス記号と下り方向を対応づける
    avoid_when:
      - 上り方向との比較が主題ではない場面
    visual_type: vector
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: label
        value_type: string
        description: 下り方向を示す短いラベル。
        default: 更新 = 下り方向
    example: "黄色い矢印で下り方向を示し、-∇Lの意味へつなげる。"

  - id: formula_bridge
    name: Formula Bridge
    category: metaphor
    description: 比喩で見せた動きから、対応する数式パーツへ戻す。
    use_when:
      - 山を下る比喩を更新式の -η∇L に対応づける
      - 直感説明のあとに数式を再確認する
    avoid_when:
      - まだ比喩導入前の場面
    visual_type: formula
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: formula_focus
        value_type: latex_string
        description: 比喩から戻したいLaTeX部分。
        default: "-\\eta\\nabla L"
      - name: caption
        value_type: string
        description: 比喩と数式をつなぐ短い説明。
        default: 式の中の下る一歩
    example: "足跡の一歩を、式の -η∇L に対応づけて強調する。"

  - id: descent_path
    name: Descent Path
    category: optimization
    description: 更新を繰り返した点の軌跡を表示する。
    use_when:
      - 勾配降下法の反復を見せる
      - 初期位置の違いで到達先が変わることを示す
    avoid_when:
      - 1回の計算だけを説明する場面
    visual_type: curve
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: steps
        value_type: integer
        description: 表示する更新回数。
      - name: initial_x
        value_type: number
        description: 初期位置x。
      - name: initial_y
        value_type: number
        description: 初期位置y。
    example: "左から始めた軌跡と右から始めた軌跡を比較する。"

  - id: sgd_jitter
    name: SGD Jitter
    category: optimization
    description: 確率的勾配降下法のミニバッチ由来の揺れを点線や小さな横揺れで示す。
    use_when:
      - 通常の勾配降下法とSGDの違いを軽く説明する
      - ノイズが探索に影響する直感を補足する
    avoid_when:
      - SGDを主題にしない短い動画
    visual_type: curve
    template_support:
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: jitter_strength
        value_type: number
        description: 揺れの強さ。
    example: "滑らかな軌跡に、少し揺れた点線の軌跡を重ねる。"

  - id: summary
    name: Summary
    category: narration
    description: 最後に式、直感、誤解しやすい点を短く整理する。
    use_when:
      - 動画の最後に学びをまとめる
      - 次に学ぶ概念へ橋渡しする
    avoid_when:
      - 途中の概念導入シーン
    visual_type: text
    template_support:
      - penalty_curve
      - gradient_descent_3d
      - storyboard_only
    params:
      - name: takeaway
        value_type: string
        description: 持ち帰ってほしい一文。
    example: "勾配降下法は全体を見比べず、今いる場所の傾きだけで次の一歩を決める。"

  - id: perceptron_node
    name: Perceptron Node
    category: neural_network
    description: 入力、重み付き和、活性化、出力をノードとして並べ、単純パーセプトロンの構造を見せる。
    use_when:
      - 単純パーセプトロンの順伝播を説明する
      - 入力、重み、バイアス、出力の関係を図にする
    avoid_when:
      - 層が多数ある全結合ニューラルネットワーク全体を主役にする場面
    visual_type: text
    template_support:
      - perceptron
      - storyboard_only
    params:
      - name: input_labels
        value_type: string_list
        description: 入力ノード名。
      - name: output_label
        value_type: string
        description: 出力ノード名。
    example: "x1, x2, biasを左に置き、sumとactivationを通ってyへ流す。"

  - id: weighted_connection
    name: Weighted Connection
    category: neural_network
    description: 入力からニューロンへ向かう矢印に重みを添え、各入力がどれだけ効くかを示す。
    use_when:
      - w_i x_i の意味を説明する
      - 全結合の接続を後で説明するための下地を作る
    avoid_when:
      - 重みではなく確率や損失の形を主役にする場面
    visual_type: vector
    template_support:
      - perceptron
      - storyboard_only
    params:
      - name: weights
        value_type: number_list
        description: 入力ごとの重み。
    example: "x1からw1、x2からw2のラベル付き矢印を出す。"

  - id: weighted_sum
    name: Weighted Sum
    category: neural_network
    description: z = w1x1 + w2x2 + b のように、入力を重み付きで足し合わせる計算を見せる。
    use_when:
      - ニューロンが最初に線形結合を作ることを説明する
      - バイアスの役割を説明する
    avoid_when:
      - 非線形活性化だけを主役にする場面
    visual_type: formula
    template_support:
      - perceptron
      - storyboard_only
    params:
      - name: formula_focus
        value_type: latex_string
        description: 強調する重み付き和の式。
        default: "z = w_1x_1 + w_2x_2 + b"
    example: "入力値を代入してzの値が決まる様子を表示する。"

  - id: activation_function
    name: Activation Function
    category: neural_network
    description: 重み付き和zを、0/1や確率のような出力へ変換する関数として見せる。
    use_when:
      - step関数やsigmoidの役割を説明する
      - 線形結合だけでは分類結果にならないことを示す
    avoid_when:
      - 活性化なしの線形回帰を説明する場面
    visual_type: curve
    template_support:
      - perceptron
      - storyboard_only
    params:
      - name: activation
        value_type: enum
        description: 表示する活性化関数。
        default: step
        allowed_values:
          - step
          - sigmoid
    example: "zが0以上なら1、0未満なら0になるstep関数を表示する。"

  - id: decision_boundary
    name: Decision Boundary
    category: neural_network
    description: w1x1 + w2x2 + b = 0 を2D平面上の境界線として表示する。
    use_when:
      - 単純パーセプトロンが2クラスを直線で分けることを説明する
      - 重みとバイアスが境界線の向きと位置を決めることを示す
    avoid_when:
      - 入力が高次元で2D平面に落とせない場面
    visual_type: axis
    template_support:
      - perceptron
      - storyboard_only
    params:
      - name: weights
        value_type: number_list
        description: 境界線を決める重み。
      - name: bias
        value_type: number
        description: 境界線をずらすバイアス。
    example: "平面上に点を置き、直線のどちら側かでクラスが変わることを示す。"

  - id: forward_pass
    name: Forward Pass
    category: neural_network
    description: 入力から重み付き和、活性化、出力へ値が流れる順伝播をハイライトする。
    use_when:
      - 学習ではなく推論時の計算の流れを説明する
      - 全結合ニューラルネットワークへ拡張する前に1ニューロンの流れを固定する
    avoid_when:
      - 勾配計算や誤差逆伝播を主題にする場面
    visual_type: text
    template_support:
      - perceptron
      - storyboard_only
    params:
      - name: input_values
        value_type: number_list
        description: 例として流す入力値。
    example: "x -> z -> a -> y の順に光らせる。"

  - id: dense_layer
    name: Dense Layer
    category: neural_network
    description: 複数のニューロンを縦に並べ、1つの層として表示する。
    use_when:
      - 全結合ニューラルネットワークの入力層、隠れ層、出力層を説明する
      - 単純パーセプトロンが複数並ぶことを見せる
    avoid_when:
      - 1つのニューロンだけを主役にする場面
    visual_type: text
    template_support:
      - fully_connected_network
      - storyboard_only
    params:
      - name: layer_sizes
        value_type: number_list
        description: 各層のノード数。
    example: "入力3個、隠れ4個、出力2個の層を左から右へ並べる。"

  - id: fully_connected_edges
    name: Fully Connected Edges
    category: neural_network
    description: 前の層の全ノードから次の層の全ノードへ線を引き、全結合を表す。
    use_when:
      - 全結合という言葉の意味を視覚化する
      - W行列が多数の重みをまとめたものだと説明する
    avoid_when:
      - 疎結合や畳み込みのように接続が限定される構造を説明する場面
    visual_type: vector
    template_support:
      - fully_connected_network
      - storyboard_only
    params:
      - name: connection_opacity
        value_type: number
        description: 接続線の透明度。
        default: 0.45
    example: "入力層の各ノードから隠れ層の各ノードへ薄い線を引く。"

  - id: layer_activation
    name: Layer Activation
    category: neural_network
    description: 各ニューロンの線形和を活性化関数へ通し、次の層へ渡す値に変換する。
    use_when:
      - h = sigma(Wx + b) のsigmaの役割を説明する
      - 線形変換だけでなく非線形変換が入ることを見せる
    avoid_when:
      - 活性化関数を使わない線形モデルを説明する場面
    visual_type: formula
    template_support:
      - fully_connected_network
      - storyboard_only
    params:
      - name: activation
        value_type: enum
        description: 表示する活性化関数。
        default: relu
        allowed_values:
          - relu
          - sigmoid
          - tanh
    example: "Wx+bのあとにReLUを通してhを作る。"

  - id: softmax_output
    name: Softmax Output
    category: neural_network
    description: 出力層のlogitsをクラスごとの確率分布へ変換する。
    use_when:
      - 分類タスクの出力を確率として読む
      - クロスエントロピーへ接続する前段を説明する
    avoid_when:
      - 回帰タスクや2値の単純なstep出力を説明する場面
    visual_type: axis
    template_support:
      - fully_connected_network
      - storyboard_only
    params:
      - name: class_labels
        value_type: string_list
        description: 出力クラス名。
    example: "猫と犬のlogitsをsoftmaxで確率バーに変える。"
