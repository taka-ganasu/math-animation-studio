concepts:
  gradient_descent:
    domain: optimization
    aliases:
      - 勾配降下法
      - steepest descent
    likely_formulas:
      - "\\theta_{t+1} = \\theta_t - \\eta \\nabla L(\\theta_t)"
    recommended_animation_family: trajectory_on_surface

  cross_entropy:
    domain: machine_learning
    aliases:
      - cross entropy loss
      - log loss
      - negative log likelihood
    likely_formulas:
      - "L = - \\sum_i y_i \\log(\\hat{y}_i)"
    recommended_animation_family: penalty_curve

  scaled_dot_product_attention:
    domain: deep_learning
    aliases:
      - attention
      - transformer attention
    likely_formulas:
      - "softmax(QK^T / sqrt(d_k))V"
    recommended_animation_family: matrix_similarity_heatmap

  perceptron:
    domain: machine_learning
    aliases:
      - simple perceptron
      - 単純パーセプトロン
      - パーセプトロン
    likely_formulas:
      - "a = step(w^T x + b)"
      - "z = w_1 x_1 + w_2 x_2 + b"
    recommended_animation_family: perceptron_decision_boundary

  fully_connected_network:
    domain: deep_learning
    aliases:
      - fully connected neural network
      - dense neural network
      - multilayer perceptron
      - 全結合ニューラルネットワーク
      - 全結合層
      - 多層パーセプトロン
    likely_formulas:
      - "\\hat{y} = \\mathrm{softmax}(W_2 \\sigma(W_1 x + b_1) + b_2)"
      - "h = \\sigma(Wx + b)"
    recommended_animation_family: fully_connected_forward_pass

  neural_network_transform:
    domain: deep_learning
    aliases:
      - neural network transform
      - nn transform
      - representation learning
      - 中間表現
      - 表現学習
      - 線形変換と非線形変換
    likely_formulas:
      - "h = \\sigma(Wx + b)"
      - "h_2 = \\sigma(W_2\\sigma(W_1x+b_1)+b_2)"
    recommended_animation_family: neural_network_transform_flow

  backpropagation:
    domain: deep_learning
    aliases:
      - backprop
      - 誤差逆伝播
      - 逆伝播
    likely_formulas:
      - "\\delta^{(l)} = (W^{(l+1)T}\\delta^{(l+1)}) \\odot \\sigma'(z^{(l)})"
      - "W \\leftarrow W - \\eta \\frac{\\partial L}{\\partial W}"
    recommended_animation_family: backpropagation_chain_rule

  chain_rule:
    domain: calculus
    aliases:
      - chain rule
      - 連鎖律
      - 合成関数の微分
    likely_formulas:
      - "\\frac{dy}{dx}=\\frac{dy}{du}\\frac{du}{dx}"
      - "\\frac{\\partial L}{\\partial W}=\\frac{\\partial L}{\\partial \\hat{y}}\\frac{\\partial \\hat{y}}{\\partial W}"
    recommended_animation_family: chain_rule_flow
